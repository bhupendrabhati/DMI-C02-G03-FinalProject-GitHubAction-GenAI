spring:
  application:
    name: api-gateway

  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888/}

  cloud:
    gateway:

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

      server:
        webflux:

          default-filters:
            - name: CircuitBreaker
              args:
                name: defaultCircuitBreaker
                fallbackUri: forward:/fallback

            - name: Retry
              args:
                retries: 1
                statuses: SERVICE_UNAVAILABLE
                methods: POST

          routes:
            - id: vets-service
              uri: lb://vets-service
              predicates:
                - Path=/api/vet/**

            - id: visits-service
              uri: lb://visits-service
              predicates:
                - Path=/api/visit/**

            - id: customers-service
              uri: lb://customers-service
              predicates:
                - Path=/api/customer/**

            - id: genai-service
              uri: lb://genai-service
              predicates:
                - Path=/api/genai/**
              filters:
                - CircuitBreaker=name=genaiCircuitBreaker,fallbackUri=/fallback

  reactor:
    context-propagation: auto

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka}

---
spring:
  config:
    activate:
      on-profile: docker

    import: configserver:http://config-server:8888