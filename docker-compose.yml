services:
  config-server:
    image: config-server:latest
    container_name: config-server

    deploy:
      resources:
        limits:
          memory: 512M

    healthcheck:
      test: ["CMD", "curl", "-f", "http://config-server:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

    ports:
      - "8888:8888"

    environment:
      CONFIG_SERVER_URL: http://config-server:8888

  discovery-server:
    image: discovery-server:latest
    container_name: discovery-server

    deploy:
      resources:
        limits:
          memory: 512M

    depends_on:
      config-server:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://discovery-server:8761"]
      interval: 10s
      timeout: 5s
      retries: 10

    ports:
      - "8761:8761"

    environment:
      CONFIG_SERVER_URL: http://config-server:8888

  customers-service:
    image: customers-service:latest
    container_name: customers-service

    deploy:
      resources:
        limits:
          memory: 512M

    depends_on:
      discovery-server:
        condition: service_healthy

    ports:
      - "8081:8081"

    environment:
      CONFIG_SERVER_URL: http://config-server:8888

  visits-service:
    image: visits-service:latest
    container_name: visits-service

    deploy:
      resources:
        limits:
          memory: 512M

    depends_on:
      discovery-server:
        condition: service_healthy

    ports:
      - "8082:8082"

    environment:
      CONFIG_SERVER_URL: http://config-server:8888

  vets-service:
    image: vets-service:latest
    container_name: vets-service

    deploy:
      resources:
        limits:
          memory: 512M

    depends_on:
      discovery-server:
        condition: service_healthy

    ports:
      - "8083:8083"

    environment:
      CONFIG_SERVER_URL: http://config-server:8888

  genai-service:
    image: genai-service:latest
    container_name: genai-service

    deploy:
      resources:
        limits:
          memory: 512M

    depends_on:
      discovery-server:
        condition: service_healthy

    ports:
      - "8084:8084"

    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}

  api-gateway:
    image: api-gateway:latest
    container_name: api-gateway

    deploy:
      resources:
        limits:
          memory: 512M

    depends_on:
      discovery-server:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      CONFIG_SERVER_URL: http://config-server:8888

  tracing-server:
    image: openzipkin/zipkin
    container_name: tracing-server

    deploy:
      resources:
        limits:
          memory: 512M

    ports:
      - "9411:9411"

  admin-server:
    image: admin-server:latest
    container_name: admin-server

    deploy:
      resources:
        limits:
          memory: 512M

    depends_on:
      discovery-server:
        condition: service_healthy

    ports:
      - "9090:9090"

    environment:
      CONFIG_SERVER_URL: http://config-server:8888

  grafana-server:
    build: ./docker/grafana
    container_name: grafana-server

    deploy:
      resources:
        limits:
          memory: 256M

    ports:
      - "3030:3000"

  prometheus-server:
    build: ./docker/prometheus
    container_name: prometheus-server

    deploy:
      resources:
        limits:
          memory: 256M

    ports:
      - "9091:9090"