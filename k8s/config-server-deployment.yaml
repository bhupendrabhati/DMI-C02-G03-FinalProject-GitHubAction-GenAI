apiVersion: apps/v1
kind: Deployment

metadata:
  name: config-server
  labels:
    app: config-server

spec:
  replicas: 1

  selector:
    matchLabels:
      app: config-server

  template:
    metadata:
      labels:
        app: config-server

    spec:
      containers:
        - name: config-server

          image: bhupendrabhati/config-server:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8888

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"

            limits:
              cpu: "300m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888

            initialDelaySeconds: 90
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888

            initialDelaySeconds: 180
            periodSeconds: 20

---
apiVersion: v1
kind: Service

metadata:
  name: config-server

spec:
  selector:
    app: config-server

  ports:
    - protocol: TCP
      port: 8888
      targetPort: 8888

  type: ClusterIP