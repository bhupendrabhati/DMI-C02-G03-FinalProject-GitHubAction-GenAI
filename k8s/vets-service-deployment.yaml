apiVersion: apps/v1
kind: Deployment

metadata:
  name: vets-service
  labels:
    app: vets-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: vets-service

  template:
    metadata:
      labels:
        app: vets-service

    spec:

      initContainers:
        - name: wait-for-discovery-server
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until wget -qO- http://discovery-server:8761/actuator/health; do echo waiting for discovery-server; sleep 5; done"
            ]

        - name: wait-for-mysql
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until nc -z mysql 3306; do echo waiting for mysql; sleep 5; done"
            ]

      containers:
        - name: vets-service

          image: bhupendrabhati/vets-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8082

          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-server:8761/eureka"

            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://config-server:8888"

            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/petclinic?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: username

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"

            limits:
              cpu: "500m"
              memory: "1Gi"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082

            initialDelaySeconds: 40
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082

            initialDelaySeconds: 90
            periodSeconds: 20

---
apiVersion: v1
kind: Service

metadata:
  name: vets-service

spec:
  selector:
    app: vets-service

  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082

  type: ClusterIP