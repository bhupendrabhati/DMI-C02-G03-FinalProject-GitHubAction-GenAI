apiVersion: apps/v1
kind: Deployment

metadata:
  name: genai-service
  labels:
    app: genai-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: genai-service

  template:
    metadata:
      labels:
        app: genai-service

    spec:

      initContainers:
        - name: wait-for-discovery-server
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until wget -qO- http://discovery-server:8761/actuator/health; do echo waiting for discovery-server; sleep 5; done"
            ]

      containers:
        - name: genai-service

          image: bhupendrabhati/genai-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8084

          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-server:8761/eureka"

            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://config-server:8888"

            # Groq API Key
            - name: SPRING_AI_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: groq-secret
                  key: API_KEY

            # Groq OpenAI-compatible endpoint
            - name: SPRING_AI_OPENAI_BASE_URL
              value: "https://api.groq.com/openai"

            # Model name
            - name: SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL
              value: "llama-3.3-70b-versatile"

            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "*"
              
            - name: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
              value: "always"

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"

            limits:
              cpu: "300m"
              memory: "512Mi"

          # readinessProbe:
          #   httpGet:
          #     path: /actuator/health
          #     port: 8084

          #   initialDelaySeconds: 180
          #   timeoutSeconds: 5
          #   periodSeconds: 15
          #   failureThreshold: 10

          # livenessProbe:
          #   httpGet:
          #     path: /actuator/health
          #     port: 8084

          #   initialDelaySeconds: 300
          #   timeoutSeconds: 5
          #   periodSeconds: 15
          #   failureThreshold: 10

---
apiVersion: v1
kind: Service

metadata:
  name: genai-service

spec:
  selector:
    app: genai-service

  ports:
    - protocol: TCP
      port: 8084
      targetPort: 8084

  type: ClusterIP