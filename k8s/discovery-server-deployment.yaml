apiVersion: apps/v1
kind: Deployment

metadata:
  name: discovery-server
  labels:
    app: discovery-server

spec:
  replicas: 1

  selector:
    matchLabels:
      app: discovery-server

  template:
    metadata:
      labels:
        app: discovery-server

    spec:

      initContainers:
        - name: wait-for-config-server
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until wget -qO- http://config-server:8888/actuator/health; do echo waiting for config-server; sleep 5; done"
            ]

      containers:
        - name: discovery-server

          image: bhupendrabhati/discovery-server:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8761

          env:
            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://config-server:8888"

          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"

            limits:
              cpu: "300m"
              memory: "768Mi"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761

            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761

            initialDelaySeconds: 60
            periodSeconds: 20

---
apiVersion: v1
kind: Service

metadata:
  name: discovery-server

spec:
  selector:
    app: discovery-server

  ports:
    - protocol: TCP
      port: 8761
      targetPort: 8761

  type: ClusterIP